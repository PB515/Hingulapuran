<svg viewBox="0 0 1100 1240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Georgia, 'Times New Roman', serif">
  <title>The Lineages of the Hinglaj Puran</title>
  <desc>Two genealogical trees from the Shri Hingulapuran: the Surya-vamsha (Sudarshana line, chapters 31-42) and the Brahmakshatriya community line (chapters 73-86, branching into Lohana, Bhatia, Khatri and Pushkarna), all bound to Hingula Mata as kuldevi.</desc>

  <!-- ground -->
  <rect x="0" y="0" width="1100" height="1240" fill="#12101F"/>
  <!-- frame -->
  <rect x="16" y="16" width="1068" height="1208" fill="none" stroke="#C9A227" stroke-width="3"/>
  <rect x="26" y="26" width="1048" height="1188" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.45"/>

  <!-- title -->
  <text x="550" y="64" text-anchor="middle" fill="#C9A227" font-size="30" letter-spacing="2">The Lineages</text>
  <text x="550" y="90" text-anchor="middle" fill="#E7D7B8" font-size="14" opacity="0.8">Genealogies from the Shri Hingulapuran</text>
  <path d="M540,102 l10,7 l-10,7 l-10,-7 z" fill="#C9A227"/>

  <!-- ======================= TREE 1 ======================= -->
  <text x="550" y="150" text-anchor="middle" fill="#D97A1A" font-size="17" font-style="italic">I &#183; Surya-vamsha &#8212; the Sudarshana line</text>

  <!-- connectors -->
  <g stroke="#C9A227" stroke-width="1.5" fill="none">
    <line x1="550" y1="234" x2="410" y2="285"/>
    <line x1="550" y1="234" x2="690" y2="285"/>
    <line x1="410" y1="339" x2="410" y2="390"/>
    <line x1="690" y1="339" x2="690" y2="390"/>
    <line x1="195" y1="339" x2="180" y2="390"/>
  </g>
  <line x1="905" y1="234" x2="720" y2="290" stroke="#6E757C" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="838" y="262" fill="#6E757C" font-size="11" font-style="italic">father</text>
  <!-- weds -->
  <line x1="285" y1="417" x2="305" y2="417" stroke="#B5302A" stroke-width="2.5"/>
  <text x="295" y="408" text-anchor="middle" fill="#B5302A" font-size="11">weds</text>

  <!-- nodes -->
  <!-- Dhruvasandhi -->
  <rect x="445" y="180" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="550" y="205" text-anchor="middle" fill="#E7D7B8" font-size="16">Dhruvasandhi</text>
  <text x="550" y="223" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">solar-dynasty king</text>
  <!-- Sudhajit -->
  <rect x="800" y="180" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#6E757C" stroke-width="1.5"/>
  <text x="905" y="205" text-anchor="middle" fill="#E7D7B8" font-size="16">Sudhajit</text>
  <text x="905" y="223" text-anchor="middle" fill="#6E757C" font-size="11">usurper &#8224;</text>
  <!-- Virasena -->
  <rect x="90" y="285" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="195" y="310" text-anchor="middle" fill="#E7D7B8" font-size="16">Virasena</text>
  <text x="195" y="328" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">king of Kashi</text>
  <!-- Manorama -->
  <rect x="305" y="285" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="410" y="310" text-anchor="middle" fill="#E7D7B8" font-size="16">Manorama</text>
  <text x="410" y="328" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">queen</text>
  <!-- Lilavati -->
  <rect x="585" y="285" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="690" y="310" text-anchor="middle" fill="#E7D7B8" font-size="16">Lilavati</text>
  <text x="690" y="328" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">queen</text>
  <!-- Shashikala -->
  <rect x="75" y="390" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="180" y="422" text-anchor="middle" fill="#E7D7B8" font-size="16">Shashikala</text>
  <!-- Sudarshana -->
  <rect x="305" y="390" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="2"/>
  <text x="410" y="415" text-anchor="middle" fill="#E7D7B8" font-size="16">Sudarshana</text>
  <text x="410" y="433" text-anchor="middle" fill="#D97A1A" font-size="11">kli&#7747;-devotee &#8594; king</text>
  <!-- Shatrujit -->
  <rect x="585" y="390" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#6E757C" stroke-width="1.5"/>
  <text x="690" y="422" text-anchor="middle" fill="#E7D7B8" font-size="16">Shatrujit &#8224;</text>

  <text x="550" y="472" text-anchor="middle" fill="#E7D7B8" font-size="12.5" opacity="0.75">&#8224; Sudhajit &amp; Shatrujit are slain by Chandika at the svayamvara-battle (ch 40); Sudarshana regains Ayodhya.</text>

  <!-- divider -->
  <line x1="90" y1="508" x2="510" y2="508" stroke="#C9A227" stroke-width="1" opacity="0.45"/>
  <line x1="590" y1="508" x2="1010" y2="508" stroke="#C9A227" stroke-width="1" opacity="0.45"/>
  <path d="M550,500 l11,8 l-11,8 l-11,-8 z" fill="#C9A227"/>

  <!-- ======================= TREE 2 ======================= -->
  <text x="550" y="548" text-anchor="middle" fill="#D97A1A" font-size="17" font-style="italic">II &#183; Brahmakshatriya &#8212; the community line</text>

  <!-- connectors -->
  <g stroke="#C9A227" stroke-width="1.5" fill="none">
    <line x1="430" y1="629" x2="430" y2="660"/>
    <line x1="430" y1="714" x2="430" y2="745"/>
    <line x1="430" y1="799" x2="430" y2="830"/>
    <line x1="430" y1="888" x2="430" y2="920"/>
    <line x1="430" y1="974" x2="430" y2="1005"/>
    <line x1="430" y1="1059" x2="150" y2="1110"/>
    <line x1="430" y1="1059" x2="350" y2="1110"/>
    <line x1="430" y1="1059" x2="550" y2="1110"/>
  </g>
  <!-- Hingula grants vardan (dotted gold) -->
  <line x1="765" y1="947" x2="540" y2="947" stroke="#C9A227" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="650" y="939" text-anchor="middle" fill="#D97A1A" font-size="11">grants the vardan (ch 84)</text>
  <!-- refuge + diksha label -->
  <text x="445" y="908" fill="#E7D7B8" font-size="11" opacity="0.8">refuge + diksha</text>
  <!-- Parashurama sanctifies Pushkarna (dotted curve, right) -->
  <path d="M535,687 Q1005,860 860,1110" stroke="#C9A227" stroke-width="1.4" fill="none" stroke-dasharray="5 4"/>
  <text x="980" y="858" text-anchor="middle" fill="#D97A1A" font-size="10.5">sanctified by Rama</text>

  <!-- nodes -->
  <!-- Jamadagni -->
  <rect x="325" y="575" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="430" y="608" text-anchor="middle" fill="#E7D7B8" font-size="16">Jamadagni</text>
  <!-- Parashurama -->
  <rect x="325" y="660" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="430" y="685" text-anchor="middle" fill="#E7D7B8" font-size="16">Parashurama</text>
  <text x="430" y="703" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">Bhargava</text>
  <!-- Ratnasena -->
  <rect x="325" y="745" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="430" y="778" text-anchor="middle" fill="#E7D7B8" font-size="16">King Ratnasena</text>
  <!-- Five princes -->
  <rect x="255" y="830" width="350" height="58" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="430" y="853" text-anchor="middle" fill="#E7D7B8" font-size="15">The five princes</text>
  <text x="430" y="873" text-anchor="middle" fill="#C9A227" font-size="11.5" opacity="0.9">Jayasena &#183; Bindhuman &#183; Vishal &#183; Chandrashal &#183; (+1)</text>
  <!-- Brahmakshatriya -->
  <rect x="325" y="920" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="2"/>
  <text x="430" y="953" text-anchor="middle" fill="#E7D7B8" font-size="16">Brahmakshatriya</text>
  <!-- Jayasena -->
  <rect x="325" y="1005" width="210" height="54" rx="8" fill="#3E0A1A" stroke="#C9A227" stroke-width="1.5"/>
  <text x="430" y="1030" text-anchor="middle" fill="#E7D7B8" font-size="16">Jayasena</text>
  <text x="430" y="1048" text-anchor="middle" fill="#C9A227" font-size="11" opacity="0.85">rules Kanauj</text>

  <!-- Hingula (goddess) with jyot flame -->
  <path d="M860 884 C 851 898, 851 909, 860 916 C 869 909, 869 898, 860 884 Z" fill="#D97A1A"/>
  <path d="M860 893 C 855 901, 855 908, 860 912 C 865 908, 865 901, 860 893 Z" fill="#F3D58A"/>
  <rect x="765" y="918" width="190" height="60" rx="10" fill="#3E0A1A" stroke="#D97A1A" stroke-width="2.5"/>
  <text x="860" y="945" text-anchor="middle" fill="#C9A227" font-size="16">Hingula Mata</text>
  <text x="860" y="964" text-anchor="middle" fill="#E7D7B8" font-size="11.5" opacity="0.9">kuldevi</text>

  <!-- community leaves -->
  <rect x="60" y="1110" width="180" height="56" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="1.5"/>
  <text x="150" y="1135" text-anchor="middle" fill="#E7D7B8" font-size="15">Lohana</text>
  <text x="150" y="1153" text-anchor="middle" fill="#D97A1A" font-size="10.5">48 Rathod sardars</text>

  <rect x="260" y="1110" width="180" height="56" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="1.5"/>
  <text x="350" y="1142" text-anchor="middle" fill="#E7D7B8" font-size="15">Bhatia</text>

  <rect x="460" y="1110" width="180" height="56" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="1.5"/>
  <text x="550" y="1142" text-anchor="middle" fill="#E7D7B8" font-size="15">Khatri</text>

  <rect x="770" y="1110" width="180" height="56" rx="8" fill="#3E0A1A" stroke="#D97A1A" stroke-width="1.5"/>
  <text x="860" y="1135" text-anchor="middle" fill="#E7D7B8" font-size="15">Pushkarna</text>
  <text x="860" y="1153" text-anchor="middle" fill="#D97A1A" font-size="10.5">brahmins</text>

  <!-- footer -->
  <text x="550" y="1200" text-anchor="middle" fill="#E7D7B8" font-size="11" opacity="0.6">Working draft &#8212; names on worn pages are tentative; pandit review pending. &#183; Palette: Mata-ni-Pachedi</text>
</svg>
